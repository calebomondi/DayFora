services:
  - type: web
    name: dayfora
    env: static
    buildCommand: cd mobile && npm ci && npx expo export --platform web
    staticPublishPath: mobile/dist
    envVars:
      - key: EXPO_PUBLIC_SUPABASE_URL
        sync: false
      - key: EXPO_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: EXPO_PUBLIC_API_BASE_URL
        sync: false

  - type: web
    name: dayfora-backend
    runtime: python
    buildCommand: cd backend && pip install -e .
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DAYFORA_SEMANTIC_SEARCH
        value: "1"
