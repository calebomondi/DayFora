services:
  - type: web
    name: dayfora
    env: static
    buildCommand: cd mobile && npm ci && npx expo export --platform web
    staticPublishPath: mobile/dist
    envVars:
      - key: EXPO_PUBLIC_SUPABASE_URL
        sync: false
      - key: EXPO_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: EXPO_PUBLIC_API_BASE_URL
        sync: false

  - type: web
    name: dayfora-backend
    runtime: python
    buildCommand: cd backend && pip install -e .
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: LANGGRAPH_DATABASE_URL
        sync: false
      - key: LANGGRAPH_SUPABASE_POOLER_HOST
        sync: false
      - key: LANGGRAPH_SUPABASE_POOLER_PORT
        value: "5432"
      - key: DAYFORA_JOB_TOKEN
        sync: false
      - key: DAYFORA_SEMANTIC_SEARCH
        value: "1"
      - key: DAYFORA_EMBEDDING_FUNCTION
        value: "embed-diary-text"
      - key: DAYFORA_ENV
        value: "production"
